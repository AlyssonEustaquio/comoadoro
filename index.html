<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffet ComoAdoro - Sistema de Custos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 50%, #fbbf24 100%);
            min-height: 100vh;
        }
        
        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }
        
        .btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.3);
        }
        
        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }
        
        .input-field:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
            outline: none;
        }
        
        .tab-active {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.3);
            transform: translateY(-2px);
        }
        
        .toast {
            animation: slideIn 0.3s ease, slideOut 0.3s ease 2.7s;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <!-- Navegação -->
        <div class="flex flex-wrap gap-3 mb-8">
            <button onclick="mostrarAba('produtos')" id="aba-produtos" class="tab-active px-6 py-3 rounded-xl font-semibold shadow-lg transition-all flex items-center gap-2">
                <i class="fas fa-box"></i>
                Ingredientes
            </button>
            <button onclick="mostrarAba('receitas')" id="aba-receitas" class="px-6 py-3 rounded-xl font-semibold shadow-md hover:shadow-lg transition-all bg-white flex items-center gap-2">
                <i class="fas fa-book-open"></i>
                Receitas
            </button>
        </div>

        <!-- Produtos Section -->
        <section id="tela-produtos" class="tela fade-in">
            <div class="grid md:grid-cols-2 gap-8">
                <div class="card p-8">
                    <h2 class="text-2xl font-bold mb-6" id="titulo-produto">
                        <i class="fas fa-plus-circle text-green-500"></i> Novo Ingrediente
                    </h2>
                    <form id="form-produto" onsubmit="salvarProduto(event)" class="space-y-4">
                        <input type="hidden" id="id-produto">
                        <div>
                            <label class="block text-sm font-semibold mb-2">Nome do Ingrediente</label>
                            <input required id="nome-produto" class="input-field w-full rounded-xl px-4 py-3" placeholder="Ex: Farinha de Trigo">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold mb-2">Preço de Compra (R$)</label>
                                <input required type="number" step="0.01" min="0.01" id="preco-produto" class="input-field w-full rounded-xl px-4 py-3" placeholder="0,00">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-2">Quantidade</label>
                                <input required type="number" step="0.001" min="0.001" id="qtd-produto" class="input-field w-full rounded-xl px-4 py-3" placeholder="1,000">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-2">Unidade de Medida</label>
                            <select id="unidade-produto" class="input-field w-full rounded-xl px-4 py-3">
                                <option value="kg">Quilograma (kg)</option>
                                <option value="g">Grama (g)</option>
                                <option value="l">Litro (l)</option>
                                <option value="ml">Mililitro (ml)</option>
                                <option value="un">Unidade (un)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-full py-4 rounded-xl font-bold text-lg shadow-lg">
                            <i class="fas fa-save mr-2"></i> Salvar Ingrediente
                        </button>
                    </form>
                </div>

                <div class="card p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">
                            Ingredientes
                            <span class="text-lg text-gray-500" id="total-produtos">(0)</span>
                        </h2>
                    </div>
                    <div class="mb-4">
                        <input type="text" id="busca-produto" oninput="filtrarProdutos()" placeholder="🔍 Buscar ingrediente..." 
                               class="input-field w-full rounded-xl px-4 py-3">
                    </div>
                    <div id="lista-produtos" class="space-y-3 max-h-[500px] overflow-y-auto"></div>
                </div>
            </div>
        </section>

        <!-- Receitas Section -->
        <section id="tela-receitas" class="tela hidden">
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="card p-8 lg:col-span-1">
                    <h2 class="text-2xl font-bold mb-6" id="titulo-receita">
                        <i class="fas fa-plus-circle text-green-500"></i> Nova Receita
                    </h2>
                    <form id="form-receita" onsubmit="salvarReceita(event)" class="space-y-4">
                        <input type="hidden" id="id-receita">
                        <div>
                            <label class="block text-sm font-semibold mb-2">Nome da Receita</label>
                            <input required id="nome-receita" class="input-field w-full rounded-xl px-4 py-3" placeholder="Ex: Bolo de Cenoura">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-2">Rendimento (porções)</label>
                            <input required type="number" min="1" id="rendimento" value="1" class="input-field w-full rounded-xl px-4 py-3"
                                   oninput="atualizarPrecoSugerido()">
                        </div>
                        <div class="border-t pt-4">
                            <h3 class="font-semibold mb-3">Adicionar Ingrediente</h3>
                            <select id="ing-produto" class="input-field w-full rounded-xl px-4 py-3 mb-3"></select>
                            <div class="grid grid-cols-2 gap-3">
                                <input type="number" step="0.001" min="0.001" id="ing-qtd" placeholder="Quantidade" class="input-field rounded-xl px-4 py-3">
                                <select id="ing-unidade" class="input-field rounded-xl px-4 py-3">
                                    <option value="g">Gramas (g)</option>
                                    <option value="kg">Quilos (kg)</option>
                                    <option value="ml">Mililitros (ml)</option>
                                    <option value="l">Litros (l)</option>
                                    <option value="un">Unidades (un)</option>
                                </select>
                            </div>
                            <button type="button" onclick="adicionarIngrediente()" class="btn btn-primary w-full mt-4 py-3 rounded-xl">
                                <i class="fas fa-plus mr-2"></i> Adicionar
                            </button>
                        </div>
                        <div>
                            <h3 class="font-semibold mb-3">Ingredientes da Receita</h3>
                            <ul id="lista-ingredientes" class="space-y-2 min-h-[120px] bg-gray-50 rounded-xl p-3"></ul>
                        </div>
                        <div class="bg-gradient-to-r from-amber-50 to-yellow-50 border border-amber-200 p-5 rounded-xl">
                            <div class="flex justify-between font-bold text-lg">
                                <span>Custo Total</span>
                                <span id="custo-total" class="text-red-600">R$ 0,00</span>
                            </div>
                            <div class="flex justify-between text-sm mt-2">
                                <span>Custo por Porção</span>
                                <span id="custo-unitario" class="font-semibold">R$ 0,00</span>
                            </div>
                        </div>
                        <div class="bg-gradient-to-r from-green-50 to-emerald-50 border border-green-200 p-5 rounded-xl">
                            <div>
                                <label class="block text-sm font-semibold mb-2">Margem de Lucro (%)</label>
                                <input type="number" id="margem-lucro" value="150" min="0" class="input-field w-full rounded-xl px-4 py-3"
                                       oninput="atualizarPrecoSugerido()">
                            </div>
                            <div class="flex justify-between font-bold text-lg mt-3">
                                <span>Preço Sugerido (porção)</span>
                                <span id="preco-sugerido" class="text-green-600">R$ 0,00</span>
                            </div>
                            <div class="flex justify-between text-sm mt-2">
                                <span>Lucro Estimado (porção)</span>
                                <span id="lucro-estimado" class="font-semibold">R$ 0,00</span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-full py-4 rounded-xl font-bold text-lg shadow-lg">
                            <i class="fas fa-save mr-2"></i> Salvar Receita
                        </button>
                    </form>
                </div>

                <div class="card p-8 lg:col-span-2">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">
                            Receitas
                            <span class="text-lg text-gray-500" id="total-receitas">(0)</span>
                        </h2>
                    </div>
                    <div class="flex gap-3 mb-4">
                        <input type="text" id="busca-receita" oninput="filtrarReceitas()" placeholder="🔍 Buscar receita..." 
                               class="input-field flex-1 rounded-xl px-4 py-3">
                        <select id="ordem-receita" onchange="filtrarReceitas()" class="input-field rounded-xl px-4 py-3">
                            <option value="nome">Ordenar por Nome</option>
                            <option value="custo-asc">Menor Custo</option>
                            <option value="custo-desc">Maior Custo</option>
                            <option value="lucro-desc">Mais Lucrativas</option>
                        </select>
                    </div>
                    <div id="lista-receitas" class="grid md:grid-cols-2 gap-4 max-h-[600px] overflow-y-auto"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Dados
        let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        let receitas = JSON.parse(localStorage.getItem('receitas')) || [];
        let ingredientesTemp = [];

        // Toast
        function mostrarToast(mensagem, tipo = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const cores = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            const icones = {
                success: 'check-circle',
                error: 'times-circle',
                warning: 'exclamation-triangle',
                info: 'info-circle'
            };
            toast.className = `toast ${cores[tipo]} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3`;
            toast.innerHTML = `
                <i class="fas fa-${icones[tipo]}"></i>
                ${mensagem}
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Salvar dados
        function salvarDados() {
            localStorage.setItem('produtos', JSON.stringify(produtos));
            localStorage.setItem('receitas', JSON.stringify(receitas));
        }

        // Gerar ID
        function gerarId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        }

        // Formatar moeda
        function moeda(valor) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor);
        }

        // Converter para base
        function paraBase(qtd, unidade) {
            const conversoes = {
                'kg': 1,
                'g': 0.001,
                'l': 1,
                'ml': 0.001,
                'un': 1
            };
            return qtd * (conversoes[unidade] || 1);
        }

        // Preço por unidade base
        function precoPorUnidadeBase(produto) {
            const qtdBase = paraBase(produto.quantidade, produto.unidade);
            return qtdBase > 0 ? produto.preco / qtdBase : 0;
        }

        // Custo do ingrediente na receita
        function custoIngredienteReceita(ingrediente) {
            const produto = produtos.find(p => p.id === ingrediente.idProduto);
            if (!produto) return 0;
            const qtdBase = paraBase(ingrediente.quantidade, ingrediente.unidade);
            return qtdBase * precoPorUnidadeBase(produto);
        }

        // Atualizar preço sugerido (agora por unidade)
        function atualizarPrecoSugerido() {
            const custoTotal = ingredientesTemp.reduce((total, ing) => total + custoIngredienteReceita(ing), 0);
            const rendimento = Math.max(1, parseFloat(document.getElementById('rendimento').value) || 1);
            const margem = parseFloat(document.getElementById('margem-lucro').value) || 0;
            
            const custoUnitario = custoTotal / rendimento;
            const precoSugerido = custoUnitario * (1 + margem / 100);
            const lucroEstimado = precoSugerido - custoUnitario;
            
            document.getElementById('custo-total').textContent = moeda(custoTotal);
            document.getElementById('custo-unitario').textContent = moeda(custoUnitario);
            document.getElementById('preco-sugerido').textContent = moeda(precoSugerido);
            document.getElementById('lucro-estimado').textContent = moeda(lucroEstimado);
        }

        // Navegação
        function mostrarAba(aba) {
            document.querySelectorAll('.tela').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('[id^="aba-"]').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('bg-white');
            });
            
            const tela = document.getElementById(`tela-${aba}`);
            const botao = document.getElementById(`aba-${aba}`);
            
            if (tela) tela.classList.remove('hidden');
            if (botao) {
                botao.classList.add('tab-active');
                botao.classList.remove('bg-white');
            }
            
            if (aba === 'receitas') carregarSelectProdutos();
        }

        // Produtos
        function salvarProduto(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome-produto').value.trim();
            const preco = parseFloat(document.getElementById('preco-produto').value);
            const quantidade = parseFloat(document.getElementById('qtd-produto').value);
            const unidade = document.getElementById('unidade-produto').value;
            
            if (!nome || preco <= 0 || quantidade <= 0) {
                mostrarToast('Preencha todos os campos corretamente', 'error');
                return;
            }
            
            // Verificar duplicata
            const duplicata = produtos.find(p => 
                p.nome.toLowerCase() === nome.toLowerCase() && 
                p.id !== document.getElementById('id-produto').value
            );
            
            if (duplicata) {
                mostrarToast('Ingrediente já cadastrado!', 'warning');
                return;
            }
            
            const id = document.getElementById('id-produto').value;
            const dados = { id: id || gerarId(), nome, preco, quantidade, unidade };
            
            if (id) {
                const index = produtos.findIndex(p => p.id === id);
                if (index !== -1) produtos[index] = dados;
                mostrarToast('Ingrediente atualizado com sucesso!', 'success');
            } else {
                produtos.push(dados);
                mostrarToast('Ingrediente cadastrado com sucesso!', 'success');
            }
            
            salvarDados();
            listarProdutos();
            cancelarEdicaoProduto();
        }

        function editarProduto(id) {
            const produto = produtos.find(p => p.id === id);
            if (!produto) return;
            
            document.getElementById('id-produto').value = produto.id;
            document.getElementById('nome-produto').value = produto.nome;
            document.getElementById('preco-produto').value = produto.preco;
            document.getElementById('qtd-produto').value = produto.quantidade;
            document.getElementById('unidade-produto').value = produto.unidade;
            document.getElementById('titulo-produto').innerHTML = '<i class="fas fa-edit text-blue-500"></i> Editar Ingrediente';
            
            document.querySelector('#tela-produtos .card:first-child').scrollIntoView({ behavior: 'smooth' });
        }

        function excluirProduto(id) {
            if (!confirm('Tem certeza que deseja excluir este ingrediente?')) return;
            
            const emUso = receitas.some(r => r.ingredientes.some(ing => ing.idProduto === id));
            if (emUso) {
                mostrarToast('Este ingrediente está em uso em receitas! Remova-o das receitas primeiro.', 'warning');
                return;
            }
            
            produtos = produtos.filter(p => p.id !== id);
            salvarDados();
            listarProdutos();
            mostrarToast('Ingrediente excluído com sucesso!', 'success');
        }

        function cancelarEdicaoProduto() {
            document.getElementById('form-produto').reset();
            document.getElementById('id-produto').value = '';
            document.getElementById('titulo-produto').innerHTML = '<i class="fas fa-plus-circle text-green-500"></i> Novo Ingrediente';
        }

        function filtrarProdutos() {
            const busca = document.getElementById('busca-produto').value.toLowerCase();
            const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(busca));
            renderizarProdutos(filtrados);
        }

        function renderizarProdutos(lista = produtos) {
            const div = document.getElementById('lista-produtos');
            document.getElementById('total-produtos').textContent = `(${lista.length})`;
            
            if (lista.length === 0) {
                div.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i class="fas fa-box-open text-6xl mb-4 text-gray-300"></i>
                        <p>Nenhum ingrediente encontrado</p>
                    </div>
                `;
                return;
            }
            
            div.innerHTML = lista.sort((a, b) => a.nome.localeCompare(b.nome)).map(p => {
                const precoUnitario = precoPorUnidadeBase(p);
                const unidadeBase = p.unidade === 'ml' ? 'l' : p.unidade === 'g' ? 'kg' : p.unidade;
                
                return `
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl hover:bg-amber-50 transition-all">
                        <div class="flex-1">
                            <div class="font-semibold">${p.nome}</div>
                            <div class="text-sm text-gray-600">
                                ${moeda(p.preco)} / ${p.quantidade}${p.unidade}
                                <span class="text-amber-600 font-medium ml-2">
                                    (${moeda(precoUnitario)}/${unidadeBase})
                                </span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editarProduto('${p.id}')" 
                                    class="px-3 py-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition-all">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="excluirProduto('${p.id}')" 
                                    class="px-3 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-all">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function listarProdutos() {
            renderizarProdutos();
            document.getElementById('busca-produto').value = '';
        }

        // Receitas
        function carregarSelectProdutos() {
            const select = document.getElementById('ing-produto');
            select.innerHTML = '<option value="">Selecione um ingrediente...</option>' +
                produtos.sort((a, b) => a.nome.localeCompare(b.nome)).map(p => 
                    `<option value="${p.id}">${p.nome} (${moeda(precoPorUnidadeBase(p))}/${p.unidade === 'ml' ? 'l' : p.unidade === 'g' ? 'kg' : p.unidade})</option>`
                ).join('');
        }

        function adicionarIngrediente() {
            const idProduto = document.getElementById('ing-produto').value;
            const quantidade = parseFloat(document.getElementById('ing-qtd').value);
            const unidade = document.getElementById('ing-unidade').value;
            
            if (!idProduto) {
                mostrarToast('Selecione um ingrediente', 'warning');
                return;
            }
            
            if (!quantidade || quantidade <= 0) {
                mostrarToast('Quantidade inválida', 'error');
                return;
            }
            
            const produto = produtos.find(p => p.id === idProduto);
            if (!produto) return;
            
            // Verificar duplicata
            const duplicata = ingredientesTemp.find(ing => 
                ing.idProduto === idProduto && ing.unidade === unidade
            );
            
            if (duplicata) {
                mostrarToast('Este ingrediente já foi adicionado!', 'warning');
                return;
            }
            
            ingredientesTemp.push({
                idProduto,
                nome: produto.nome,
                quantidade,
                unidade
            });
            
            document.getElementById('ing-qtd').value = '';
            document.getElementById('ing-produto').value = '';
            
            listarIngredientesTemp();
            atualizarPrecoSugerido();
        }

        function removerIngrediente(index) {
            ingredientesTemp.splice(index, 1);
            listarIngredientesTemp();
            atualizarPrecoSugerido();
        }

        function listarIngredientesTemp() {
            const ul = document.getElementById('lista-ingredientes');
            
            if (ingredientesTemp.length === 0) {
                ul.innerHTML = '<li class="text-gray-400 text-center py-4">Nenhum ingrediente adicionado</li>';
                return;
            }
            
            ul.innerHTML = ingredientesTemp.map((ing, i) => `
                <li class="flex justify-between items-center bg-white p-3 rounded-lg border">
                    <div>
                        <span class="font-semibold">${ing.nome}</span>
                        <span class="text-gray-600 ml-2">${ing.quantidade} ${ing.unidade}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-gray-600">${moeda(custoIngredienteReceita(ing))}</span>
                        <button onclick="removerIngrediente(${i})" 
                                class="text-red-500 hover:text-red-700 transition-all">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </li>
            `).join('');
        }

        function salvarReceita(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome-receita').value.trim();
            const rendimento = parseInt(document.getElementById('rendimento').value);
            
            if (!nome || rendimento < 1) {
                mostrarToast('Preencha todos os campos', 'error');
                return;
            }
            
            if (ingredientesTemp.length === 0) {
                mostrarToast('Adicione pelo menos um ingrediente', 'warning');
                return;
            }
            
            // Verificar duplicata
            const duplicata = receitas.find(r => 
                r.nome.toLowerCase() === nome.toLowerCase() && 
                r.id !== document.getElementById('id-receita').value
            );
            
            if (duplicata) {
                mostrarToast('Receita já cadastrada!', 'warning');
                return;
            }
            
            const custoTotal = ingredientesTemp.reduce((total, ing) => total + custoIngredienteReceita(ing), 0);
            const id = document.getElementById('id-receita').value;
            const dados = {
                id: id || gerarId(),
                nome,
                rendimento,
                ingredientes: [...ingredientesTemp],
                custoTotal,
                custoUnitario: custoTotal / rendimento
            };
            
            if (id) {
                const index = receitas.findIndex(r => r.id === id);
                if (index !== -1) receitas[index] = dados;
                mostrarToast('Receita atualizada com sucesso!', 'success');
            } else {
                receitas.push(dados);
                mostrarToast('Receita cadastrada com sucesso!', 'success');
            }
            
            salvarDados();
            listarReceitas();
            cancelarEdicaoReceita();
        }

        function editarReceita(id) {
            const receita = receitas.find(r => r.id === id);
            if (!receita) return;
            
            document.getElementById('id-receita').value = receita.id;
            document.getElementById('nome-receita').value = receita.nome;
            document.getElementById('rendimento').value = receita.rendimento;
            document.getElementById('margem-lucro').value = 150;
            
            ingredientesTemp = JSON.parse(JSON.stringify(receita.ingredientes));
            document.getElementById('titulo-receita').innerHTML = '<i class="fas fa-edit text-blue-500"></i> Editar Receita';
            
            carregarSelectProdutos();
            listarIngredientesTemp();
            atualizarPrecoSugerido();
            mostrarAba('receitas');
            
            document.querySelector('#tela-receitas .card:first-child').scrollIntoView({ behavior: 'smooth' });
        }

        function excluirReceita(id) {
            if (!confirm('Tem certeza que deseja excluir esta receita?')) return;
            
            receitas = receitas.filter(r => r.id !== id);
            salvarDados();
            listarReceitas();
            mostrarToast('Receita excluída com sucesso!', 'success');
        }

        function cancelarEdicaoReceita() {
            document.getElementById('form-receita').reset();
            document.getElementById('id-receita').value = '';
            document.getElementById('margem-lucro').value = 150;
            ingredientesTemp = [];
            listarIngredientesTemp();
            atualizarPrecoSugerido();
            document.getElementById('titulo-receita').innerHTML = '<i class="fas fa-plus-circle text-green-500"></i> Nova Receita';
        }

        function filtrarReceitas() {
            const busca = document.getElementById('busca-receita').value.toLowerCase();
            const ordem = document.getElementById('ordem-receita').value;
            
            let filtradas = receitas.filter(r => r.nome.toLowerCase().includes(busca));
            
            switch(ordem) {
                case 'custo-asc':
                    filtradas.sort((a, b) => (a.custoTotal || 0) - (b.custoTotal || 0));
                    break;
                case 'custo-desc':
                    filtradas.sort((a, b) => (b.custoTotal || 0) - (a.custoTotal || 0));
                    break;
                case 'lucro-desc':
                    // ordenar por lucro por unidade (usando margem 150%)
                    filtradas.sort((a, b) => {
                        const lucroA = ((a.custoTotal || 0) / a.rendimento) * 1.5;
                        const lucroB = ((b.custoTotal || 0) / b.rendimento) * 1.5;
                        return lucroB - lucroA;
                    });
                    break;
                default:
                    filtradas.sort((a, b) => a.nome.localeCompare(b.nome));
            }
            
            renderizarReceitas(filtradas);
        }

        function renderizarReceitas(lista = receitas) {
            const div = document.getElementById('lista-receitas');
            document.getElementById('total-receitas').textContent = `(${lista.length})`;
            
            if (lista.length === 0) {
                div.innerHTML = `
                    <div class="col-span-2 text-center py-12 text-gray-500">
                        <i class="fas fa-receipt text-6xl mb-4 text-gray-300"></i>
                        <p>Nenhuma receita encontrada</p>
                    </div>
                `;
                return;
            }
            
            div.innerHTML = lista.map(r => {
                const custoUnitario = (r.custoTotal || 0) / r.rendimento;
                const precoSugerido = custoUnitario * 2.5; // margem de 150%
                const lucroEstimado = precoSugerido - custoUnitario;
                
                return `
                    <div class="card p-6 border border-amber-100">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold text-lg flex-1">${r.nome}</h3>
                            <div class="flex gap-1">
                                <button onclick="editarReceita('${r.id}')" 
                                        class="px-2 py-1 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 text-sm">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="excluirReceita('${r.id}')" 
                                        class="px-2 py-1 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 text-sm">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="text-sm text-gray-600 mb-3">
                            <i class="fas fa-users mr-1"></i> ${r.rendimento} porções
                            <span class="mx-2">•</span>
                            <i class="fas fa-box mr-1"></i> ${r.ingredientes.length} ingredientes
                        </div>
                        
                        <div class="bg-gray-50 rounded-xl p-3 space-y-2">
                            <div class="flex justify-between">
                                <span class="text-sm text-gray-600">Custo Total</span>
                                <span class="font-bold text-red-600">${moeda(r.custoTotal || 0)}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-sm text-gray-600">Por Porção</span>
                                <span class="font-semibold">${moeda(custoUnitario)}</span>
                            </div>
                            <div class="border-t pt-2 flex justify-between">
                                <span class="text-sm text-gray-600">Preço (un.)</span>
                                <span class="font-bold text-green-600">${moeda(precoSugerido)}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-sm text-gray-600">Lucro (un.)</span>
                                <span class="font-semibold text-purple-600">${moeda(lucroEstimado)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function listarReceitas() {
            renderizarReceitas();
            document.getElementById('busca-receita').value = '';
            document.getElementById('ordem-receita').value = 'nome';
        }

        // Inicialização
        listarProdutos();
        listarReceitas();
        mostrarAba('produtos');
    </script>
</body>
</html>
