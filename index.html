<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffet Como Adoro - Custos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #facc15, #eab308);
        }
        .aba-ativa { 
            background-color: rgb(220 38 38); 
            color: white; 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); 
        }
        .card {
            background: white;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-6xl">
        <header class="bg-white/90 backdrop-blur-md text-slate-900 p-6 rounded-3xl shadow-2xl mb-8 flex items-center gap-6 border-4 border-amber-800">
            <img src="logo.jpg" alt="Buffet Como Adoro" class="w-24 h-24 rounded-2xl border-4 border-amber-800 shadow-md object-cover">
            <div>
                <h1 class="text-4xl font-bold">Buffet Como Adoro</h1>
                <p class="text-amber-900 text-xl">Controle de Receitas e Custos</p>
            </div>
        </header>

        <div class="flex flex-wrap gap-2 mb-8">
            <button onclick="mostrarAba('produtos')" id="aba-produtos" class="aba-ativa px-8 py-4 rounded-2xl font-semibold text-lg shadow-md">📦 Ingredientes</button>
            <button onclick="mostrarAba('receitas')" id="aba-receitas" class="px-8 py-4 rounded-2xl font-semibold shadow-md hover:bg-white/80 transition text-lg bg-white/90">📝 Receitas</button>
        </div>

        <section id="tela-produtos" class="tela">
            <div class="grid md:grid-cols-2 gap-6">
                <div class="card p-8 rounded-3xl border border-amber-200">
                    <h2 class="text-2xl font-bold mb-6 text-slate-800" id="titulo-produto">➕ Novo Ingrediente</h2>
                    <form id="form-produto" onsubmit="salvarProduto(event)" class="space-y-5">
                        <input type="hidden" id="id-produto">
                        <input required id="nome-produto" class="w-full border border-slate-300 rounded-2xl px-5 py-4" placeholder="Nome do ingrediente">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm mb-2">Preço (R$)</label>
                                <input required type="number" step="0.01" id="preco-produto" class="w-full border border-slate-300 rounded-2xl px-5 py-4">
                            </div>
                            <div>
                                <label class="block text-sm mb-2">Quantidade</label>
                                <input required type="number" step="0.001" id="qtd-produto" class="w-full border border-slate-300 rounded-2xl px-5 py-4">
                            </div>
                        </div>
                        <select id="unidade-produto" class="w-full border border-slate-300 rounded-2xl px-5 py-4">
                            <option value="kg">kg - Quilograma</option>
                            <option value="g">g - Grama</option>
                            <option value="l">l - Litro</option>
                            <option value="ml">ml - Mililitro</option>
                            <option value="un">un - Unidade</option>
                        </select>
                        <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-bold text-lg shadow-md">Salvar Ingrediente</button>
                    </form>
                </div>

                <div class="card p-8 rounded-3xl border border-amber-200">
                    <h2 class="text-2xl font-bold mb-6">Ingredientes Cadastrados (<span id="total-produtos">0</span>)</h2>
                    <div id="lista-produtos" class="space-y-4 max-h-[550px] overflow-auto"></div>
                </div>
            </div>
        </section>

        <section id="tela-receitas" class="tela hidden">
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="card p-8 rounded-3xl border border-amber-200 lg:col-span-1">
                    <h2 class="text-2xl font-bold mb-6 text-slate-800" id="titulo-receita">➕ Nova Receita</h2>
                    <form id="form-receita" onsubmit="salvarReceita(event)" class="space-y-5">
                        <input type="hidden" id="id-receita">
                        <input required id="nome-receita" class="w-full border border-slate-300 rounded-2xl px-5 py-4" placeholder="Nome da receita">
                        <div>
                            <label class="block text-sm mb-2">Rendimento (porções)</label>
                            <input required type="number" min="1" id="rendimento" value="1" class="w-full border border-slate-300 rounded-2xl px-5 py-4">
                        </div>
                        <div class="border-t pt-4">
                            <h3 class="font-semibold mb-3">Adicionar Ingrediente</h3>
                            <select id="ing-produto" class="w-full border border-slate-300 rounded-2xl px-5 py-3 mb-3"></select>
                            <div class="grid grid-cols-2 gap-3">
                                <input type="number" step="0.001" id="ing-qtd" placeholder="Quantidade" class="border border-slate-300 rounded-2xl px-5 py-3">
                                <select id="ing-unidade" class="border border-slate-300 rounded-2xl px-5 py-3">
                                    <option value="g">g</option>
                                    <option value="kg">kg</option>
                                    <option value="ml">ml</option>
                                    <option value="l">l</option>
                                    <option value="un">un</option>
                                </select>
                            </div>
                            <button type="button" onclick="adicionarIngrediente()" class="w-full mt-4 bg-red-600 hover:bg-red-700 text-white py-3 rounded-2xl">+ Adicionar Ingrediente</button>
                        </div>
                        <div>
                            <h3 class="font-semibold mb-2">Ingredientes</h3>
                            <ul id="lista-ingredientes" class="space-y-2 min-h-[120px]"></ul>
                        </div>
                        <div class="bg-yellow-50 border border-yellow-200 p-5 rounded-2xl">
                            <div class="flex justify-between font-bold text-lg">
                                <span>Custo Total</span>
                                <span id="custo-total" class="text-red-600">R$ 0,00</span>
                            </div>
                            <div class="flex justify-between text-sm mt-1">
                                <span>Custo por Porção</span>
                                <span id="custo-unitario">R$ 0,00</span>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-bold text-lg shadow-md">Salvar Receita</button>
                    </form>
                </div>

                <div class="card p-8 rounded-3xl border border-amber-200 lg:col-span-2">
                    <h2 class="text-2xl font-bold mb-6">Receitas Cadastradas (<span id="total-receitas">0</span>)</h2>
                    <div id="lista-receitas" class="grid md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        let receitas = JSON.parse(localStorage.getItem('receitas')) || [];
        let ingredientesTemp = [];

        function salvarDados() {
            localStorage.setItem('produtos', JSON.stringify(produtos));
            localStorage.setItem('receitas', JSON.stringify(receitas));
        }

        function gerarId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2);
        }

        function moeda(v) {
            return `R$ ${v.toFixed(2).replace('.', ',')}`;
        }

        function paraBase(qtd, unidade) {
            switch(unidade) {
                case 'kg': return qtd;
                case 'g': return qtd / 1000;
                case 'l': return qtd * 1000;
                case 'ml': return qtd;
                default: return qtd;
            }
        }

        function getUnidadeBase(unidade) {
            if (unidade === 'ml' || unidade === 'l') return 'l';
            if (unidade === 'g' || unidade === 'kg') return 'kg';
            return unidade;
        }

        function precoBase(produto) {
            let totalBase = paraBase(produto.quantidade, produto.unidade);
            if (totalBase <= 0) return 0;
            let precoPorBase = produto.preco / totalBase;
            if (['l','ml'].includes(produto.unidade)) {
                return precoPorBase * 1000;
            }
            return precoPorBase;
        }

        function produtoPrecoBaseReal(prod) {
            const totalBase = paraBase(prod.quantidade, prod.unidade);
            return totalBase > 0 ? prod.preco / totalBase : 0;
        }

        function custoIngrediente(ing) {
            const prod = produtos.find(p => p.id === ing.idProduto);
            if (!prod) return 0;
            const qtdBase = paraBase(ing.quantidade, ing.unidade);
            return qtdBase * produtoPrecoBaseReal(prod);
        }

        function calcularCustoReceita(receita) {
            return receita.ingredientes.reduce((soma, ing) => soma + custoIngrediente(ing), 0);
        }

        function atualizarTodosOsCustos() {
            receitas = receitas.map(r => ({
                ...r,
                custoTotal: calcularCustoReceita(r),
                custoUnitario: calcularCustoReceita(r) / Math.max(1, r.rendimento)
            }));
            salvarDados();
            listarReceitas();
        }

        function mostrarAba(aba) {
            document.querySelectorAll('.tela').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('[id^="aba-"]').forEach(b => b.classList.remove('aba-ativa'));
            document.getElementById(`tela-${aba}`).classList.remove('hidden');
            document.getElementById(`aba-${aba}`).classList.add('aba-ativa');
            if (aba === 'receitas') carregarSelectProdutos();
        }

        function salvarProduto(e) {
            e.preventDefault();
            const id = document.getElementById('id-produto').value;
            const dados = {
                id: id || gerarId(),
                nome: document.getElementById('nome-produto').value.trim(),
                preco: parseFloat(document.getElementById('preco-produto').value),
                quantidade: parseFloat(document.getElementById('qtd-produto').value),
                unidade: document.getElementById('unidade-produto').value
            };
            if (id) {
                const i = produtos.findIndex(p => p.id === id);
                produtos[i] = dados;
            } else {
                produtos.push(dados);
            }
            atualizarTodosOsCustos();
            listarProdutos();
            cancelarEdicaoProduto();
        }

        function editarProduto(id) {
            const p = produtos.find(x => x.id === id);
            document.getElementById('id-produto').value = p.id;
            document.getElementById('nome-produto').value = p.nome;
            document.getElementById('preco-produto').value = p.preco;
            document.getElementById('qtd-produto').value = p.quantidade;
            document.getElementById('unidade-produto').value = p.unidade;
            document.getElementById('titulo-produto').textContent = '✏️ Editar Ingrediente';
        }

        function excluirProduto(id) {
            if (!confirm('Excluir este ingrediente?')) return;
            produtos = produtos.filter(p => p.id !== id);
            receitas.forEach(r => r.ingredientes = r.ingredientes.filter(i => i.idProduto !== id));
            atualizarTodosOsCustos();
            listarProdutos();
        }

        function cancelarEdicaoProduto() {
            document.getElementById('form-produto').reset();
            document.getElementById('id-produto').value = '';
            document.getElementById('titulo-produto').textContent = '➕ Novo Ingrediente';
        }

        function listarProdutos() {
            const div = document.getElementById('lista-produtos');
            document.getElementById('total-produtos').textContent = produtos.length;
            if (produtos.length === 0) {
                div.innerHTML = '<p class="text-slate-400 py-8 text-center">Nenhum ingrediente cadastrado</p>';
                return;
            }
            div.innerHTML = produtos.sort((a,b)=>a.nome.localeCompare(b.nome)).map(p => {
                const unidadeBase = getUnidadeBase(p.unidade);
                const precoPorBase = moeda(precoBase(p));
                return `
                    <div class="flex justify-between items-center border border-amber-200 rounded-2xl p-5 hover:bg-amber-50">
                        <div>
                            <div class="font-semibold">${p.nome}</div>
                            <div class="text-sm text-slate-500">${moeda(p.preco)} / ${p.quantidade}${p.unidade} → ${precoPorBase} por ${unidadeBase}</div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="editarProduto('${p.id}')" class="text-blue-600">Editar</button>
                            <button onclick="excluirProduto('${p.id}')" class="text-red-500">Excluir</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function carregarSelectProdutos() {
            const sel = document.getElementById('ing-produto');
            sel.innerHTML = produtos.sort((a,b)=>a.nome.localeCompare(b.nome)).map(p => 
                `<option value="${p.id}">${p.nome}</option>`
            ).join('');
        }

        function adicionarIngrediente() {
            const idProd = document.getElementById('ing-produto').value;
            const qtd = parseFloat(document.getElementById('ing-qtd').value);
            const uni = document.getElementById('ing-unidade').value;
            if (!idProd || !qtd) return alert('Preencha os campos do ingrediente');
            const prod = produtos.find(p => p.id === idProd);
            ingredientesTemp.push({idProduto: idProd, nome: prod.nome, quantidade: qtd, unidade: uni});
            document.getElementById('ing-qtd').value = '';
            listarIngredientesTemp();
        }

        function removerIngrediente(i) {
            ingredientesTemp.splice(i, 1);
            listarIngredientesTemp();
        }

        function listarIngredientesTemp() {
            const ul = document.getElementById('lista-ingredientes');
            ul.innerHTML = ingredientesTemp.map((ing, i) => `
                <li class="flex justify-between bg-yellow-50 px-4 py-3 rounded-2xl">
                    <span>${ing.quantidade} ${ing.unidade} - ${ing.nome}</span>
                    <button onclick="removerIngrediente(${i})" class="text-red-500 font-bold">×</button>
                </li>
            `).join('');
            const total = ingredientesTemp.reduce((s,i)=>s+custoIngrediente(i),0);
            const rend = parseFloat(document.getElementById('rendimento').value) || 1;
            document.getElementById('custo-total').textContent = moeda(total);
            document.getElementById('custo-unitario').textContent = moeda(total/rend);
        }

        function salvarReceita(e) {
            e.preventDefault();
            if (ingredientesTemp.length === 0) return alert('Adicione pelo menos um ingrediente');
            const id = document.getElementById('id-receita').value;
            const dados = {
                id: id || gerarId(),
                nome: document.getElementById('nome-receita').value.trim(),
                rendimento: parseFloat(document.getElementById('rendimento').value),
                ingredientes: [...ingredientesTemp]
            };
            if (id) {
                const i = receitas.findIndex(r => r.id === id);
                receitas[i] = {...dados, custoTotal: calcularCustoReceita(dados), custoUnitario: calcularCustoReceita(dados)/dados.rendimento};
            } else {
                dados.custoTotal = calcularCustoReceita(dados);
                dados.custoUnitario = dados.custoTotal / dados.rendimento;
                receitas.push(dados);
            }
            atualizarTodosOsCustos();
            cancelarEdicaoReceita();
        }

        function editarReceita(id) {
            const r = receitas.find(x => x.id === id);
            document.getElementById('id-receita').value = r.id;
            document.getElementById('nome-receita').value = r.nome;
            document.getElementById('rendimento').value = r.rendimento;
            ingredientesTemp = JSON.parse(JSON.stringify(r.ingredientes));
            document.getElementById('titulo-receita').textContent = '✏️ Editar Receita';
            carregarSelectProdutos();
            listarIngredientesTemp();
            mostrarAba('receitas');
        }

        function excluirReceita(id) {
            if (!confirm('Excluir esta receita?')) return;
            receitas = receitas.filter(r => r.id !== id);
            salvarDados();
            listarReceitas();
        }

        function cancelarEdicaoReceita() {
            document.getElementById('form-receita').reset();
            document.getElementById('id-receita').value = '';
            ingredientesTemp = [];
            listarIngredientesTemp();
            document.getElementById('titulo-receita').textContent = '➕ Nova Receita';
        }

        function listarReceitas() {
            const div = document.getElementById('lista-receitas');
            document.getElementById('total-receitas').textContent = receitas.length;
            if (receitas.length === 0) {
                div.innerHTML = '<p class="text-slate-400 py-12 text-center col-span-2">Nenhuma receita cadastrada</p>';
                return;
            }
            div.innerHTML = receitas.sort((a,b)=>a.nome.localeCompare(b.nome)).map(r => `
                <div class="border border-amber-200 rounded-3xl p-6 shadow-sm bg-white">
                    <div class="flex justify-between">
                        <h3 class="font-bold text-lg">${r.nome}</h3>
                        <div>
                            <button onclick="editarReceita('${r.id}')" class="text-blue-600 text-sm mr-3">Editar</button>
                            <button onclick="excluirReceita('${r.id}')" class="text-red-500 text-sm">Excluir</button>
                        </div>
                    </div>
                    <div class="text-sm text-slate-500 mt-1">Rendimento: ${r.rendimento} porções</div>
                    <div class="mt-4 bg-yellow-50 border border-yellow-200 rounded-2xl p-4">
                        <div class="flex justify-between font-semibold">
                            <span>Custo Total</span>
                            <span class="text-red-600">${moeda(r.custoTotal)}</span>
                        </div>
                        <div class="flex justify-between text-sm mt-1">
                            <span>Por Porção</span>
                            <span class="font-semibold">${moeda(r.custoUnitario)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        listarProdutos();
        listarReceitas();
    </script>
</body>
</html>
